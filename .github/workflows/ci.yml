name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test
      - name: Generated files in sync
        run: node scripts/build-catalog.js --check
      - name: Repo invariants
        run: node scripts/doctor.js --json
